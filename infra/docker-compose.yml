name: protocol-ai

x-api-env: &api-env
  APP_ENV: ${APP_ENV}
  APP_DEBUG: ${APP_DEBUG}
  APP_SECRET_KEY: ${APP_SECRET_KEY}
  TEMPLATES_DIR: /templates
  JWT_ALGORITHM: ${JWT_ALGORITHM}
  JWT_ACCESS_TTL_MIN: ${JWT_ACCESS_TTL_MIN}
  JWT_REFRESH_TTL_DAYS: ${JWT_REFRESH_TTL_DAYS}
  API_CORS_ORIGINS: ${API_CORS_ORIGINS}
  DATABASE_URL: ${DATABASE_URL}
  ALEMBIC_DATABASE_URL: ${ALEMBIC_DATABASE_URL}
  REDIS_URL: ${REDIS_URL}
  CELERY_BROKER_URL: ${CELERY_BROKER_URL}
  CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
  S3_ENDPOINT: ${S3_ENDPOINT}
  S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT}
  S3_REGION: ${S3_REGION}
  S3_ACCESS_KEY: ${S3_ACCESS_KEY}
  S3_SECRET_KEY: ${S3_SECRET_KEY}
  S3_BUCKET_MEDIA: ${S3_BUCKET_MEDIA}
  S3_BUCKET_EXPORTS: ${S3_BUCKET_EXPORTS}
  HUGGINGFACE_TOKEN: ${HUGGINGFACE_TOKEN}
  OPENAI_API_KEY: ${OPENAI_API_KEY}
  LLM_PROVIDER: ${LLM_PROVIDER}
  LLM_MODEL: ${LLM_MODEL}
  ASR_MODEL: ${ASR_MODEL}
  ASR_DEVICE: ${ASR_DEVICE}
  ASR_COMPUTE_TYPE: ${ASR_COMPUTE_TYPE}
  ASR_KAZAKH_MODEL: ${ASR_KAZAKH_MODEL}
  DIARIZATION_MODEL: ${DIARIZATION_MODEL}

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local ${S3_ENDPOINT} ${S3_ACCESS_KEY} ${S3_SECRET_KEY} &&
      mc mb -p local/${S3_BUCKET_MEDIA} || true &&
      mc mb -p local/${S3_BUCKET_EXPORTS} || true &&
      mc anonymous set download local/${S3_BUCKET_EXPORTS} || true
      "

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      <<: *api-env
    volumes:
      - ../backend:/app
      - ../ml-models:/ml-models
      - ../образцы:/templates
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  asr-worker:
    build:
      context: ../backend
      dockerfile: Dockerfile.ml
    command: celery -A app.workers.celery_app worker -Q asr,default -l info -c 1
    environment:
      <<: *api-env
    volumes:
      - ../backend:/app
      - ../ml-models:/ml-models
    depends_on:
      - api
      - redis
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  bot:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: python -m app.bot
    environment:
      <<: *api-env
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      BOT_API_URL: http://api:8000
    volumes:
      - ../backend:/app
    depends_on:
      - api
    restart: unless-stopped

  flower:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: celery -A app.workers.celery_app flower --port=5555
    environment:
      <<: *api-env
    ports:
      - "5555:5555"
    depends_on:
      - redis

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
      NEXT_PUBLIC_DEFAULT_LOCALE: ${NEXT_PUBLIC_DEFAULT_LOCALE}
    ports:
      - "3000:3000"
    volumes:
      - ../frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - api

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - api
      - frontend

volumes:
  pgdata:
  miniodata:
  frontend_node_modules:
