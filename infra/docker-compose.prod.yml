name: protocol-ai-prod

x-api-env: &api-env
  APP_ENV: production
  APP_DEBUG: "false"
  APP_SECRET_KEY: ${APP_SECRET_KEY}
  JWT_ALGORITHM: ${JWT_ALGORITHM}
  JWT_ACCESS_TTL_MIN: ${JWT_ACCESS_TTL_MIN}
  JWT_REFRESH_TTL_DAYS: ${JWT_REFRESH_TTL_DAYS}
  API_CORS_ORIGINS: ${API_CORS_ORIGINS}
  DATABASE_URL: ${DATABASE_URL}
  ALEMBIC_DATABASE_URL: ${ALEMBIC_DATABASE_URL}
  REDIS_URL: ${REDIS_URL}
  CELERY_BROKER_URL: ${CELERY_BROKER_URL}
  CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
  S3_ENDPOINT: ${S3_ENDPOINT}
  S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT}
  S3_REGION: ${S3_REGION}
  S3_ACCESS_KEY: ${S3_ACCESS_KEY}
  S3_SECRET_KEY: ${S3_SECRET_KEY}
  S3_BUCKET_MEDIA: ${S3_BUCKET_MEDIA}
  S3_BUCKET_EXPORTS: ${S3_BUCKET_EXPORTS}
  HUGGINGFACE_TOKEN: ${HUGGINGFACE_TOKEN}
  OPENAI_API_KEY: ${OPENAI_API_KEY}
  LLM_PROVIDER: ${LLM_PROVIDER}
  LLM_MODEL: ${LLM_MODEL}
  ASR_MODEL: ${ASR_MODEL}
  ASR_DEVICE: ${ASR_DEVICE}
  ASR_COMPUTE_TYPE: ${ASR_COMPUTE_TYPE}
  ASR_KAZAKH_MODEL: ${ASR_KAZAKH_MODEL}
  DIARIZATION_MODEL: ${DIARIZATION_MODEL}

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - /var/lib/protocol-ai/pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    volumes:
      - /var/lib/protocol-ai/minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local ${S3_ENDPOINT} ${S3_ACCESS_KEY} ${S3_SECRET_KEY} &&
      mc mb -p local/${S3_BUCKET_MEDIA} || true &&
      mc mb -p local/${S3_BUCKET_EXPORTS} || true
      "
    restart: "no"

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile.prod
    restart: always
    environment:
      <<: *api-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  asr-worker:
    build:
      context: ../backend
      dockerfile: Dockerfile.ml
    restart: always
    command: celery -A app.workers.celery_app worker -Q asr,default -l info -c 2
    environment:
      <<: *api-env
    volumes:
      - /var/lib/protocol-ai/ml-models:/ml-models
    depends_on:
      - api
      - redis
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile.prod
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
      NEXT_PUBLIC_DEFAULT_LOCALE: ${NEXT_PUBLIC_DEFAULT_LOCALE}
    depends_on:
      - api

  nginx:
    image: nginx:alpine
    restart: always
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
      - frontend
