services:
  redis:
    ports: !reset []
  postgres:
    ports: !reset []

  asr-worker-cpu:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: celery -A app.workers.celery_app worker -Q asr,default -l info -c 2
    env_file:
      - ../.env
    environment:
      ASR_HF_SPACE: ${ASR_HF_SPACE:-nuraly17/kazakh-asr}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      S3_ENDPOINT: http://minio:9000
    volumes:
      - ../backend:/app
      - ../ml-models:/ml-models
    depends_on:
      - api
      - redis
    restart: unless-stopped
